<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Colors — Tier badges</title>
<style>
  body { margin: 0; padding: 24px 28px; background: #fff; min-height: 180px; box-sizing: border-box; font-family: "Geist", system-ui, sans-serif; color:#111827; }
  .group-label { font: 500 11px/1 "Geist Mono", ui-monospace, monospace; color:#6B7280; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
  .pills { display: flex; gap: 8px; flex-wrap: wrap; }
  .pill { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 9999px; font-size: 12px; font-weight: 500; }
  .pill .ico { margin-right: 4px; }
  p.note { font-size: 12px; color: #6B7280; margin-top: 14px; max-width: 60ch; }
</style>
</head>
<body>
  <div class="group-label">Subscription tiers — admin-configurable, 10 swatch options</div>
  <div class="pills">
    <span class="pill" style="background:#F3F4F6;color:#374151"><span class="ico">○</span>Free</span>
    <span class="pill" style="background:#DBEAFE;color:#1D4ED8"><span class="ico">◆</span>Standard</span>
    <span class="pill" style="background:#CCFBF1;color:#0F766E"><span class="ico">◈</span>Pro</span>
    <span class="pill" style="background:#F3E8FF;color:#7E22CE"><span class="ico">★</span>Premium</span>
    <span class="pill" style="background:#E0E7FF;color:#4338CA"><span class="ico">◆</span>Business</span>
    <span class="pill" style="background:#FCE7F3;color:#BE185D"><span class="ico">♥</span>VIP</span>
    <span class="pill" style="background:#FEF9C3;color:#A16207"><span class="ico">▲</span>Founder</span>
    <span class="pill" style="background:#DCFCE7;color:#15803D"><span class="ico">●</span>Enterprise</span>
    <span class="pill" style="background:#FFEDD5;color:#C2410C"><span class="ico">◆</span>Partner</span>
    <span class="pill" style="background:#FEE2E2;color:#B91C1C"><span class="ico">!</span>Trial</span>
  </div>
  <p class="note">Each tier carries a <code>displayName</code>, <code>color</code> (one of the 10 keys) and optional emoji/text icon. Renders next to the submitter on every ticket row.</p>
</body>
</html>
