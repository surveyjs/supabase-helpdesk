<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Components — Nav & Menus</title>
<style>
  body { margin: 0; padding: 0; background: #F9FAFB; min-height: 260px; font-family: "Geist", system-ui, sans-serif; color:#111827; }
  /* nav */
  nav.bar { background:#fff; border-bottom: 1px solid #E5E7EB; padding: 10px 24px; display:flex; align-items:center; justify-content:space-between; }
  .brand { display:flex; align-items:center; gap: 10px; }
  .brand .mark { width: 22px; height: 22px; }
  .brand .name { font-weight: 600; color:#111827; font-size: 18px; }
  .links { display:flex; gap: 16px; margin-left: 16px; }
  .links a { color:#374151; font-size: 14px; }
  .links a.active { color:#2563EB; font-weight: 500; }
  .right { display:flex; align-items:center; gap: 12px; font-size: 14px; color:#374151; }
  .bell { width: 22px; height: 22px; color:#6B7280; }
  .badge-count { background:#EF4444; color:#fff; font-size: 10px; font-weight: 600; border-radius: 9999px; min-width: 16px; height: 16px; padding: 0 4px; display:inline-flex; align-items:center; justify-content:center; margin-left:-8px; margin-top:-12px; position: relative; }
  .role { background:#DBEAFE; color:#1D4ED8; padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 500; }

  /* dropdown */
  .menu { background:#fff; border: 1px solid #E5E7EB; border-radius: 6px; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.08), 0 4px 6px -4px rgb(0 0 0 / 0.06); width: 200px; padding: 4px 0; margin: 14px 24px 16px auto; }
  .menu a { display:block; padding: 10px 16px; font-size: 14px; color:#374151; }
  .menu a:hover { background:#F9FAFB; }
  .menu .sep { height: 1px; background: #F3F4F6; margin: 4px 0; }
  .panel { display:flex; gap: 0; justify-content: space-between; align-items: flex-start; }

  /* Wrapper for mock screenshot framing */
  .frame { background:#F9FAFB; }
</style>
</head>
<body>
<div class="frame">
  <nav class="bar">
    <div style="display:flex;align-items:center">
      <div class="brand">
        <svg class="mark" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="2" width="36" height="36" rx="9" fill="#2563EB"/><path d="M14 18c0-3 2.7-5.5 6-5.5s6 2.4 6 5.4c0 2.2-1.2 3.3-3.1 4.6-1.7 1.1-2.1 1.8-2.1 3.1v.6" stroke="#fff" stroke-width="2.6" stroke-linecap="round" fill="none"/><circle cx="20.8" cy="30.5" r="1.7" fill="#fff"/></svg>
        <span class="name">HelpDesk</span>
      </div>
      <div class="links">
        <a class="active" href="#">Agent Dashboard</a>
        <a href="#">Help Center</a>
        <a href="#">Manage Articles</a>
      </div>
    </div>
    <div class="right">
      <div style="display:flex;align-items:center">
        <svg class="bell" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 1 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10 21a2 2 0 0 0 4 0"/></svg>
        <span class="badge-count">3</span>
      </div>
      <span>Alex Park</span>
      <span class="role">Agent</span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 9l-7 7-7-7"/></svg>
    </div>
  </nav>

  <div class="panel">
    <div></div>
    <div class="menu" role="menu">
      <a href="#">My Tickets</a>
      <a href="#">Reports</a>
      <a href="#">Canned Responses</a>
      <div class="sep"></div>
      <a href="#">Profile</a>
      <a href="#">Notification Settings</a>
      <div class="sep"></div>
      <a href="#">Sign out</a>
    </div>
  </div>
</div>
</body>
</html>
