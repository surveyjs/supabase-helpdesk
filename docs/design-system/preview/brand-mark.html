<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>HelpDesk — Brand mark</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 28px 32px; background: #fff; min-height: 200px; box-sizing: border-box; }
  .row { display: flex; align-items: center; gap: 32px; }
  .swatch { display: flex; flex-direction: column; align-items: flex-start; gap: 10px; }
  .wordmark { display: flex; align-items: center; gap: 12px; }
  .wordmark .mark { width: 36px; height: 36px; }
  .wordmark .text { font: 600 22px/1 "Geist", system-ui, sans-serif; color: #111827; letter-spacing: -0.01em; }
  .mono-tag { font: 500 11px/1 "Geist Mono", ui-monospace, monospace; color: #6B7280; text-transform: uppercase; letter-spacing: 0.06em; }
  .on-blue { background: #2563EB; padding: 14px 18px; border-radius: 8px; }
  .on-blue .text { color: #fff; }
  .small-mark { width: 28px; height: 28px; }
</style>
</head>
<body>
<div class="row">
  <div class="swatch">
    <div class="wordmark">
      <img class="mark" src="../assets/mark.svg" alt="">
      <span class="text">HelpDesk</span>
    </div>
    <span class="mono-tag">Primary lockup</span>
  </div>

  <div class="swatch">
    <div class="wordmark on-blue">
      <svg class="mark" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="36" height="36" rx="9" fill="#fff"/>
        <path d="M14 18c0-3 2.7-5.5 6-5.5s6 2.4 6 5.4c0 2.2-1.2 3.3-3.1 4.6-1.7 1.1-2.1 1.8-2.1 3.1v.6" stroke="#2563EB" stroke-width="2.6" stroke-linecap="round" fill="none"/>
        <circle cx="20.8" cy="30.5" r="1.7" fill="#2563EB"/>
      </svg>
      <span class="text">HelpDesk</span>
    </div>
    <span class="mono-tag">On primary</span>
  </div>

  <div class="swatch">
    <img class="small-mark" src="../assets/mark.svg" alt="">
    <span class="mono-tag">Mark only · favicon</span>
  </div>
</div>
</body>
</html>
