<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Elevation</title>
<style>
  body { margin: 0; padding: 28px 32px; background: #F9FAFB; min-height: 180px; box-sizing: border-box; font-family: "Geist", system-ui, sans-serif; color:#111827; }
  .row { display: flex; gap: 22px; align-items: flex-end; }
  .box { width: 130px; height: 90px; background: #fff; border-radius: 8px; border: 1px solid #E5E7EB; display: flex; align-items: center; justify-content: center; font-size: 12px; color:#374151; }
  .b1 { box-shadow: none; }
  .b2 { box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.04); }
  .b3 { box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.06), 0 2px 4px -2px rgb(0 0 0 / 0.06); }
  .b4 { box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.08), 0 4px 6px -4px rgb(0 0 0 / 0.06); }
  .lbl { display: block; font: 500 11px/1.4 "Geist Mono", ui-monospace, monospace; color:#6B7280; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 10px; text-align: center; }
  .desc { font-size: 11px; color: #9CA3AF; text-align: center; margin-top: 2px; }
</style>
</head>
<body>
<div class="row">
  <div>
    <div class="box b1">Card</div>
    <span class="lbl">Flat</span>
    <div class="desc">border only</div>
  </div>
  <div>
    <div class="box b2">Card · hover</div>
    <span class="lbl">Shadow-sm</span>
    <div class="desc">KB card hover</div>
  </div>
  <div>
    <div class="box b3">Toast</div>
    <span class="lbl">Shadow-md</span>
    <div class="desc">popovers</div>
  </div>
  <div>
    <div class="box b4">Dropdown</div>
    <span class="lbl">Shadow-lg</span>
    <div class="desc">user menu, nav</div>
  </div>
</div>
</body>
</html>
