<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Spacing & Radii</title>
<style>
  body { margin: 0; padding: 24px 28px; background: #fff; min-height: 220px; box-sizing: border-box; font-family: "Geist", system-ui, sans-serif; color:#111827; }
  .two { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }
  .label { font: 500 11px/1 "Geist Mono", ui-monospace, monospace; color:#6B7280; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
  .row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; font-size: 13px; }
  .row code { font-family: "Geist Mono", ui-monospace, monospace; color:#374151; min-width: 64px; font-size: 12px; }
  .bar { background: #2563EB; height: 10px; border-radius: 2px; }
  .rd { display: inline-block; width: 60px; height: 38px; background: #E5E7EB; border: 1px solid #D1D5DB; }
  .rd-meta { font-size: 12px; color: #6B7280; margin-left: 10px; }
  .rd-row { display: flex; align-items: center; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="two">
  <div>
    <div class="label">Spacing scale (Tailwind 4 · 4px base)</div>
    <div class="row"><code>1 · 4px</code><div class="bar" style="width:4px"></div></div>
    <div class="row"><code>2 · 8px</code><div class="bar" style="width:8px"></div></div>
    <div class="row"><code>3 · 12px</code><div class="bar" style="width:12px"></div></div>
    <div class="row"><code>4 · 16px</code><div class="bar" style="width:16px"></div></div>
    <div class="row"><code>6 · 24px</code><div class="bar" style="width:24px"></div></div>
    <div class="row"><code>8 · 32px</code><div class="bar" style="width:32px"></div></div>
    <div class="row"><code>12 · 48px</code><div class="bar" style="width:48px"></div></div>
  </div>
  <div>
    <div class="label">Corner radii</div>
    <div class="rd-row"><span class="rd" style="border-radius:4px"></span><span class="rd-meta"><code>rounded</code> · 4px — buttons, inputs</span></div>
    <div class="rd-row"><span class="rd" style="border-radius:6px"></span><span class="rd-meta"><code>rounded-md</code> · 6px — banners</span></div>
    <div class="rd-row"><span class="rd" style="border-radius:8px"></span><span class="rd-meta"><code>rounded-lg</code> · 8px — cards</span></div>
    <div class="rd-row"><span class="rd" style="border-radius:9999px;width:84px"></span><span class="rd-meta"><code>rounded-full</code> — badges</span></div>
  </div>
</div>
</body>
</html>
