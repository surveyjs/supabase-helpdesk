<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Colors — Neutrals (gray)</title>
<style>
  body { margin: 0; padding: 24px 28px; background: #fff; min-height: 220px; box-sizing: border-box; font-family: "Geist", system-ui, sans-serif; }
  .grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 10px; }
  .sw { border-radius: 8px; overflow: hidden; border: 1px solid #E5E7EB; }
  .chip { height: 72px; }
  .meta { padding: 8px 10px; background: #fff; }
  .name { font-size: 12px; font-weight: 500; color: #111827; }
  .hex { font-family: "Geist Mono", ui-monospace, monospace; font-size: 11px; color: #6B7280; margin-top: 1px; }
  .tag { font: 500 11px/1.4 "Geist Mono", ui-monospace, monospace; color: #9CA3AF; margin-top: 6px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#F9FAFB"></div><div class="meta"><div class="name">gray-50</div><div class="hex">#F9FAFB</div><div class="tag">page bg</div></div></div>
    <div class="sw"><div class="chip" style="background:#F3F4F6"></div><div class="meta"><div class="name">gray-100</div><div class="hex">#F3F4F6</div><div class="tag">hover</div></div></div>
    <div class="sw"><div class="chip" style="background:#E5E7EB"></div><div class="meta"><div class="name">gray-200</div><div class="hex">#E5E7EB</div><div class="tag">borders</div></div></div>
    <div class="sw"><div class="chip" style="background:#D1D5DB"></div><div class="meta"><div class="name">gray-300</div><div class="hex">#D1D5DB</div><div class="tag">inputs</div></div></div>
    <div class="sw"><div class="chip" style="background:#9CA3AF"></div><div class="meta"><div class="name">gray-400</div><div class="hex">#9CA3AF</div><div class="tag">disabled</div></div></div>
    <div class="sw"><div class="chip" style="background:#6B7280"></div><div class="meta"><div class="name">gray-500</div><div class="hex">#6B7280</div><div class="tag">meta</div></div></div>
    <div class="sw"><div class="chip" style="background:#4B5563"></div><div class="meta"><div class="name">gray-600</div><div class="hex">#4B5563</div><div class="tag">secondary</div></div></div>
    <div class="sw"><div class="chip" style="background:#374151"></div><div class="meta"><div class="name">gray-700</div><div class="hex">#374151</div><div class="tag">body</div></div></div>
    <div class="sw"><div class="chip" style="background:#111827"></div><div class="meta"><div class="name">gray-900</div><div class="hex">#111827</div><div class="tag">headings</div></div></div>
  </div>
</body>
</html>
